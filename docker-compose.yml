version: '3.8'

services:
  postgres:
    image: postgres:15
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_db"]
      interval: 5s
      retries: 5

  mock-server:
    build: ./mock-server
    ports: ["5000:5000"]
    depends_on:
      postgres:
        condition: service_healthy

  pipeline-service:
    build: ./pipeline-service
    ports: ["8000:8000"]
    depends_on:
      - postgres
      - mock-server
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
      # We add this so the code knows where to find the mock server
      FLASK_API_URL: http://mock-server:5000/api/customers

volumes:
  postgres_data: